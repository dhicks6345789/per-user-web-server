  # The Caddy web server - a production-ready web server that automatically handles HTTPS.
  caddy:
    image: caddy:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp" # Required for HTTP/3
    volumes:
      - /opt/caddy:/etc/caddy
      - /home/d.b.hicks/www:/srv
      - /opt/caddy/data:/data
      - /opt/caddy/config:/config
