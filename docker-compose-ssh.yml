# Guacamole Client - The Guacamole web interface for the "ssh" connection. Note that this is the same image as the "desktop" connection, just a different connection method.
  ssh:
    image: guacamole/guacamole:latest
    container_name: ssh
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      GUACD_HOSTNAME: guacd
      HTTP_AUTH_ENABLED: "true"
      HTTP_AUTH_HEADER: Remote-User
      WEBAPP_CONTEXT: ssh
    depends_on:
      - guacd
    networks:
      - main
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # /etc/guacamole is where the custom Java extension needs to be placed.
      - /etc/guacamole:/etc/guacamole
